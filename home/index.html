<!-- Auto-generated home alias for index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Minimal redirecting copy: canonical/og point to /home -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zaylore Studio | Home</title>
    <link rel="canonical" href="https://www.zaylorestudio.in/home">
    <meta property="og:url" content="https://www.zaylorestudio.in/home">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <!-- Inline simple redirect to root index (keeps /home in URL but loads index content) -->
    <script>
        // Load the index.html content via fetch and replace body - keeps URL as /home
        (function () {
            fetch('/index.html').then(r => r.text()).then(html => {
                // replace document with the fetched content but keep the URL
                document.open();
                document.write(html);
                document.close();
            }).catch(() => {
                // fallback redirect
                window.location.href = '/';
            });
        })();
    </script>
</body>

</html>
